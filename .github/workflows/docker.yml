name: Docker

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.head_ref == 'main' }}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.head_ref != 'main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  publish-branch:
    name: Build and push branch Docker image
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/heads/') && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref_name == 'main' }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Build and publish release
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/tags/v') && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch main branch
        run: git fetch origin +refs/heads/main:refs/remotes/origin/main --tags

      - name: Derive release metadata
        id: release_info
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)(\.([0-9]+))?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR or vMAJOR.MINOR.PATCH format, got: $tag" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[4]:-0}"
          version="${major}.${minor}.${patch}"

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            from_main=true
          else
            from_main=false
          fi

          current_is_highest=true
          while IFS= read -r existing_tag; do
            existing_version="${existing_tag#v}"
            if [[ ! "$existing_version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              continue
            fi

            if [[ "$existing_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
              existing_version="${existing_version}.0"
            fi

            if [[ "$existing_version" == "$version" ]]; then
              continue
            fi

            highest="$(printf '%s\n%s\n' "$version" "$existing_version" | sort -V | tail -n1)"
            if [[ "$highest" != "$version" ]]; then
              current_is_highest=false
              break
            fi
          done < <(git tag --list 'v*')

          if [[ "$from_main" == true && "$current_is_highest" == true ]]; then
            publish_latest=true
          else
            publish_latest=false
          fi

          {
            echo "version=$version"
            echo "publish_latest=$publish_latest"
            echo "make_latest=$publish_latest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release_info.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release_info.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.release_info.outputs.version }}
            type=raw,value=latest,enable=${{ steps.release_info.outputs.publish_latest == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: ${{ steps.release_info.outputs.make_latest }}
