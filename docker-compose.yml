services:
  backend:
    image: ${STOCKHOLM_IMAGE:-ghcr.io/krahl/soundcork-stockholm-app:latest}
    # To build a local image instead, uncomment the next line.
    # build: .
    # Host networking keeps SSDP multicast discovery working by default.
    network_mode: host
    volumes:
      - ./state:/app/backend/state
      - ./stockholm:/app/stockholm
      - ./stockholm_zip:/app/stockholm_zip:ro
      # Optional: Mount custom logging config
      # - ./config/logback.xml:/app/logback.xml:ro
      # Optional: Mount a custom CA certificate (PEM format) to trust self-signed/private HTTPS endpoints
      #- ./config/custom-ca.crt:/app/custom-ca.crt:ro
    environment:
      TZ: ${TZ:-Europe/Berlin}
      BACKEND_BIND_IP: ${BACKEND_BIND_IP:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8088}
      BACKEND_URL: ${BACKEND_URL:-http://soundcork:8000}
      STOCKHOLM_CLIENT_STATE_MODE: ${STOCKHOLM_CLIENT_STATE_MODE:-single}
      # Optional: defaults to BACKEND_URL/marge inside the container when unset.
      STREAMING_URL: ${STREAMING_URL:-}
      # The trailing / is important and use marge/ suffix when used against soundcork!
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://soundcork:8000/marge/}
      MARGE_AUTH_TOKEN: ${MARGE_AUTH_TOKEN:-}
      MARGE_ACCOUNT_ID: ${MARGE_ACCOUNT_ID:-}
    restart: unless-stopped
